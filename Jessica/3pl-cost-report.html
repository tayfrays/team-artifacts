<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3PL Cost Report — Outway</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:   #FF522C;
    --black:    #000000;
    --green:    #BDC5BB;
    --blue:     #C0CDDD;
    --lgray:    #F1F1F1;
    --white:    #FFFFFF;
    --border:   #E2E2E2;
    --border2:  #CACACA;
    --text:     #000000;
    --text2:    #444444;
    --text3:    #888888;
    --surface:  #F8F8F8;
    --surface2: #F1F1F1;
    --warn:     #E07B00;
    --danger:   #CC1F1F;
    --ca:       #FF522C;
    --ca-dim:   rgba(255,82,44,0.08);
    --us:       #2B4EA8;
    --us-dim:   rgba(43,78,168,0.08);
    --fm: 'JetBrains Mono', monospace;
    --fp: 'Plus Jakarta Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--white); color: var(--text); font-family: var(--fm); font-size: 13px; min-height: 100vh; }

  /* ── Tool Description ──────────────────────────────────── */
  .tool-desc {
    padding: 1.5rem 2.5rem 0;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    border-bottom: 1px solid var(--border);
  }
  .tool-desc-tag {
    font-family: var(--fm);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--orange);
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--orange);
    margin-bottom: 0.75rem;
  }
  .tool-desc-tag::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .tool-desc-body {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    padding-bottom: 1rem;
    flex-wrap: wrap;
  }
  .tool-desc-name {
    font-family: var(--fp);
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }
  .tool-desc-text {
    font-family: var(--fp);
    font-size: 13px;
    color: var(--text3);
    line-height: 1.5;
  }

  /* ── Tabs / Nav ────────────────────────────────────────── */
  .tabs {
    display: flex;
    padding: 0 36px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 0;
  }
  .tab {
    font-family: var(--fm);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 20px;
    cursor: pointer;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    color: var(--text3);
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text2); }
  .tab.ca-on { color: var(--ca); border-bottom-color: var(--ca); }
  .tab.us-on { color: var(--us); border-bottom-color: var(--us); }

  /* ── Main Layout ───────────────────────────────────────── */
  .main { padding: 28px 36px 60px; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* ── Upload bar ────────────────────────────────────────── */
  .upload-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1.5px dashed var(--border2);
    border-radius: 4px;
    padding: 14px 18px;
    margin-bottom: 24px;
    background: var(--surface);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .upload-bar:hover { border-color: var(--text3); background: var(--lgray); }
  .upload-ico { font-size: 18px; flex-shrink: 0; }
  .upload-copy { flex: 1; }
  .upload-copy b { font-family: var(--fp); font-size: 12px; color: var(--text); font-weight: 600; display: block; margin-bottom: 2px; }
  .upload-copy small { font-size: 10px; color: var(--text3); }
  .upload-btn {
    font-family: var(--fm);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 2px;
    cursor: pointer;
    border: 1.5px solid;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ca-btn { border-color: var(--ca); color: var(--ca); background: transparent; }
  .ca-btn:hover { background: var(--ca); color: var(--white); }
  .us-btn { border-color: var(--us); color: var(--us); background: transparent; }
  .us-btn:hover { background: var(--us); color: var(--white); }
  input[type=file] { display: none; }

  /* ── Section Labels ────────────────────────────────────── */
  .slabel {
    font-family: var(--fm);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text3);
    margin: 24px 0 10px;
    border-left: 2px solid var(--orange);
    padding-left: 8px;
  }
  .slabel:first-child { margin-top: 0; }

  /* ── KPI Cards ─────────────────────────────────────────── */
  .kpi-row { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; margin-bottom: 8px; }
  .kpi {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 16px 13px;
    position: relative;
    overflow: hidden;
  }
  .kpi-accent { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-lbl { font-family: var(--fm); font-size: 8.5px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .kpi-val { font-family: var(--fp); font-size: 22px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
  .kpi-sub { font-family: var(--fm); font-size: 9px; color: var(--text3); margin-top: 6px; }
  .kpi-delta { font-family: var(--fm); font-size: 10px; margin-top: 4px; }

  .c-ca { color: var(--ca); }
  .c-us { color: var(--us); }
  .c-warn { color: var(--warn); }
  .c-danger { color: var(--danger); }
  .c-muted { color: var(--text2); }

  /* ── Charts ────────────────────────────────────────────── */
  .chart-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .chart-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 20px;
  }
  .chart-ttl {
    font-family: var(--fm);
    font-size: 8.5px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  /* ── Flags ─────────────────────────────────────────────── */
  .flag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .flag {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 16px;
  }
  .flag-ttl {
    font-family: var(--fm);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 700;
  }
  .flag-body {
    font-family: var(--fp);
    font-size: 12px;
    color: var(--text2);
    line-height: 1.65;
  }
  .flag-body b { font-weight: 600; color: var(--text); }

  /* ── Data Table ────────────────────────────────────────── */
  table.dt { width: 100%; border-collapse: collapse; }
  table.dt th {
    font-family: var(--fm);
    font-size: 8px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 6px 9px;
    text-align: left;
    font-weight: 400;
    border-bottom: 1px solid var(--border);
  }
  table.dt th:not(:first-child) { text-align: right; }
  table.dt td {
    font-family: var(--fm);
    font-size: 11px;
    padding: 6px 6px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  table.dt td:not(:first-child) { text-align: right; color: var(--text2); }
  table.dt tr:hover td { background: var(--surface); }
  .bar-wrap { display: inline-block; width: 40px; height: 3px; background: var(--border); border-radius: 2px; vertical-align: middle; margin-left: 6px; }
  .bar-fill { height: 3px; border-radius: 2px; }

  /* ── Period Selector ───────────────────────────────────── */
  .period-row { display: flex; align-items: center; gap: 7px; margin-bottom: 20px; flex-wrap: wrap; }
  .period-btn {
    font-family: var(--fm);
    font-size: 10px;
    padding: 5px 11px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text3);
    transition: all 0.12s;
    letter-spacing: 0.04em;
  }
  .period-btn:hover { border-color: var(--text2); color: var(--text); }
  .period-btn.sel-ca { border-color: var(--ca); color: var(--ca); background: var(--ca-dim); }
  .period-btn.sel-us { border-color: var(--us); color: var(--us); background: var(--us-dim); }
  .period-lbl { font-family: var(--fm); font-size: 9px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }

  hr.div { border: none; border-top: 1px solid var(--border); margin: 22px 0; }

  /* ── Toast ─────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--black);
    border-left: 3px solid var(--orange);
    border-radius: 2px;
    padding: 12px 18px;
    font-family: var(--fm);
    font-size: 11px;
    color: var(--white);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 200;
    max-width: 300px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ────────────────────────────────────────── */
  @media (max-width: 1100px) {
    .chart-grid { grid-template-columns: 1fr 1fr; }
    .chart-grid > *:first-child { grid-column: 1 / -1; }
  }
  @media (max-width: 960px) {
    .kpi-row { grid-template-columns: repeat(3, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .flag-grid { grid-template-columns: 1fr 1fr; }
    .main { padding: 20px 18px 48px; }
    .tabs { padding-left: 18px; padding-right: 18px; }
    .tool-desc { padding-left: 18px; padding-right: 18px; }
    .tab { padding: 12px 14px; font-size: 9px; }
  }
  @media (max-width: 600px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .flag-grid { grid-template-columns: 1fr; }
    .tabs { overflow-x: auto; padding-left: 14px; }
    .tab { white-space: nowrap; }
    .main { padding: 16px 14px 48px; }
    .tool-desc { padding-left: 14px; padding-right: 14px; }
    .period-row { gap: 5px; }
    .upload-bar { flex-wrap: wrap; }
    .tool-desc-body { flex-direction: column; gap: 4px; }
  }
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────
let tab = 'CA', selPeriod = null, charts = {}, pendingRegion = null;
const data  = () => tab === 'CA' ? CA_DATA : US_DATA;
const accent= () => tab === 'CA' ? '#FF522C' : '#2B4EA8';
const acCls = () => tab === 'CA' ? 'c-ca' : 'c-us';
const cur   = () => tab === 'CA' ? 'CAD' : 'USD';
const isCA  = () => tab === 'CA';

function setTab(t) {
  tab=t; selPeriod=null;
  document.getElementById('tabCA').className='tab'+(t==='CA'?' ca-on':'');
  document.getElementById('tabUS').className='tab'+(t==='US'?' us-on':'');
  render();
}
function selectPeriod(lbl) { selPeriod=lbl; render(); }
function triggerUpload(r) { pendingRegion=r; document.getElementById('fileInput').click(); }

// ── Upload ────────────────────────────────────────────────────────────────
document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const period = processCSV(ev.target.result, pendingRegion);
      const arr = pendingRegion==='CA' ? CA_DATA : US_DATA;
      const idx = arr.findIndex(p=>p.label===period.label);
      if(idx>=0) arr[idx]=period; else arr.push(period);
      selPeriod = period.label;
      render();
      toast('✓ Loaded '+period.label+' ('+period.nOrders.toLocaleString()+' orders)');
    } catch(err) { toast('⚠ Parse error: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
});

function processCSV(text, region) {
  const lines = text.trim().split('\n');
  const hdr = lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
  const rows = lines.slice(1).map(line=>{ const v=line.split(',').map(x=>x.replace(/"/g,'').trim()); const o={}; hdr.forEach((h,i)=>o[h]=v[i]||''); return o; });
  const n=v=>parseFloat(v)||0;
  const isOrd=r=>r.external_order_name&&r.external_order_name.startsWith('#');
  const ordRows=rows.filter(isOrd);
  const shipped=new Set(ordRows.filter(r=>r.service==='Delivery'||r.service==='Processing').map(r=>r.external_order_name));
  const delRows=ordRows.filter(r=>r.service==='Delivery');
  let tShip=0,tPick=0,tDelay=0,tStore=0,tRecv=0;
  const pMap={}, cMap={};
  delRows.forEach(r=>{
    const sc=n(r.postage_cost)+n(r.total_parcel_delivery_amount)+n(r.total_fuel_surcharge_amount);
    tShip+=sc;
    const pv=r.shipping_address_province||r.shipping_address_state||'?';
    if(!pMap[pv]) pMap[pv]={orders:0,cost:0}; pMap[pv].orders++; pMap[pv].cost+=sc;
    const ca=r.service_provider||'Unknown';
    if(!cMap[ca]) cMap[ca]={orders:0}; cMap[ca].orders++;
  });
  rows.forEach(r=>{
    if(r.service==='Storage') tStore+=n(r.total_amount_all_services);
    if(r.service==='Receiving') tRecv+=n(r.total_amount_all_services);
    if(isOrd(r)) tDelay+=n(r.delayed_postage_cost);
    if(isOrd(r)&&(r.service==='Processing'||r.service==='Delivery')) tPick+=n(r.subtotal_pick_amount);
  });
  const td=delRows.length||1;
  const provinces=Object.entries(pMap).map(([p,v])=>({province:p,orders:v.orders,cost:Math.round(v.cost*100)/100,avg:Math.round(v.cost/v.orders*100)/100,pct:Math.round(v.orders/td*1000)/10})).sort((a,b)=>b.orders-a.orders).slice(0,8);
  const totC=Object.values(cMap).reduce((s,v)=>s+v.orders,0)||1;
  const gbP=Math.round((cMap['GoBolt']?.orders||0)/totC*1000)/10;
  const paP=Math.round(Object.entries(cMap).filter(([k])=>k.includes('Parcll')).reduce((s,[,v])=>s+v.orders,0)/totC*1000)/10;
  const dates=delRows.map(r=>r.service_date).filter(Boolean).sort();
  const first=dates[0]||'', last=dates[dates.length-1]||'';
  const fd=d=>d?d.slice(5).replace(/-/g,'/'):'?';
  const label=first?fd(first)+' – '+fd(last):'Uploaded';
  const nO=shipped.size;
  return { label, endDate:last||new Date().toISOString().slice(0,10), nOrders:nO, invoiceTotal:0, costPerOrder:0, avgShipping:nO>0?Math.round(tShip/nO*100)/100:0, totalShipping:Math.round(tShip*100)/100, totalPick:Math.round(tPick*100)/100, totalDelayed:Math.round(tDelay*100)/100, totalStorage:Math.round(tStore*100)/100, totalReceiving:Math.round(tRecv*100)/100, goboltPct:gbP, parcllPct:paP, provinces, uploaded:true };
}

// ── Helpers ───────────────────────────────────────────────────────────────
function fmt(n,d=2){ if(n==null||isNaN(n)) return '—'; return (n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtK(n){ if(Math.abs(n)>=1000) return (n<0?'-':'')+'$'+Math.abs(n/1000).toFixed(1)+'k'; return fmt(n); }
function delta(c,p){ if(!p||p===0) return ''; const d=((c-p)/Math.abs(p)*100); const cl=d>5?'c-danger':d<-5?'c-ca':'c-muted'; return `<span class="${cl}">${d>0?'▲':'▼'} ${Math.abs(d).toFixed(1)}%</span>`; }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3000); }
function destroyCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={}; }

  All amounts ${cur()} pre-tax &nbsp;·&nbsp; CA excludes INV30226 &amp; INV29328 (2025 catch-up invoices) &nbsp;·&nbsp; US excludes INV30237 (2025 Parcll peak surcharges) &nbsp;·&nbsp; ✦ = uploaded this session
</div>`;

  // ── Charts ──────────────────────────────────────────────────────────────
  const gridColor = 'rgba(0,0,0,0.06)';
  const tickColor = '#999999';

  charts.trend = new Chart(document.getElementById('cTrend'),{type:'line',data:{labels:trendLabels,datasets:[{label:'$/order (invoice)',data:trendCPO,borderColor:ac2,backgroundColor:acDim,fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:ac2,borderWidth:2},{label:'Avg ship/order',data:trendShip,borderColor:'#E07B00',backgroundColor:'transparent',fill:false,tension:0.35,pointRadius:3,pointBackgroundColor:'#E07B00',borderWidth:1.5,borderDash:[4,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tickColor,font:{size:9},boxWidth:10}},tooltip:{callbacks:{label:ctx=>' '+ctx.dataset.label+': $'+ctx.raw.toFixed(2)}}},scales:{x:{ticks:{color:tickColor,font:{size:9},maxRotation:38,autoSkip:false},grid:{color:gridColor}},y:{ticks:{color:tickColor,font:{size:9},callback:v=>'$'+v},grid:{color:gridColor}}}}});

  const bkC=[ac2,'#E07B00','#CC1F1F','#AAAAAA','#2B4EA8'];
  const bkL=['Shipping','Pick & Pack','Delayed Postage','Storage','Receiving'];
  const bkV=[p.totalShipping,p.totalPick,Math.max(0,p.totalDelayed),p.totalStorage,p.totalReceiving];
  charts.donut = new Chart(document.getElementById('cDoughnut'),{type:'doughnut',data:{labels:bkL,datasets:[{data:bkV,backgroundColor:bkC,borderWidth:2,borderColor:'#FFFFFF'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.label+': '+fmtK(ctx.raw)}}}}});
  const dL=document.getElementById('dLegend');
  if(dL) dL.innerHTML=bkL.map((l,i)=>`<span style="display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:2px;background:${bkC[i]};display:inline-block"></span>${l}</span>`).join('');

  charts.vol = new Chart(document.getElementById('cVol'),{type:'bar',data:{labels:trendLabels,datasets:[{label:'Fulfilled orders',data:trendOrders,backgroundColor:trendLabels.map(l=>l===p.label?ac2:acDim),borderRadius:2,borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+ctx.raw.toLocaleString()+' orders'}}},scales:{x:{ticks:{color:tickColor,font:{size:9},maxRotation:38,autoSkip:false},grid:{display:false}},y:{ticks:{color:tickColor,font:{size:9},callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v},grid:{color:gridColor}}}}});
}

render();
</script>
</body>
